apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-hub-gateway
  namespace: alproject
  labels:
    app.kubernetes.io/name: agent-hub-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-hub-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-hub-gateway
    spec:
      containers:
        - name: gateway
          image: alproject-agent-hub-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3010
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            # Должен совпадать с portal-env / cursor-agent-telegram — иначе GET /state и POST /ingest → 401
            - name: HUB_INGEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: portal-env
                  key: HUB_INGEST_SECRET
          readinessProbe:
            tcpSocket:
              port: 3010
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-hub-gateway
  namespace: alproject
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-hub-gateway
  ports:
    - name: http
      port: 3010
      targetPort: 3010
