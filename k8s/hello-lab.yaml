apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-lab
  namespace: alproject
  labels:
    app.kubernetes.io/name: hello-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-lab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-lab
    spec:
      containers:
        - name: hello-lab
          image: alproject-hello-lab:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hello-lab
  namespace: alproject
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: hello-lab
  ports:
    - name: http
      port: 3001
      targetPort: 3001
