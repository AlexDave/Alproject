apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: alproject
  labels:
    app.kubernetes.io/name: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
    spec:
      containers:
        - name: portal
          image: alproject-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: portal-env
          env:
            - name: NODE_ENV
              value: "production"
            # HTTP без TLS: иначе Secure-cookies не сохраняются в браузере
            - name: HUB_COOKIE_SECURE
              value: "false"
            - name: AGENT_HUB_BACKEND_URL
              value: "http://agent-hub-gateway:3010"
            # Relay = HTTP control cursor-agent-telegram (/agents). В поде 127.0.0.1 ≠ хост —
            # без этого GET /api/agent-hub/agents даёт stale + только default агент.
            # На хосте: uv run / npm start relay, в .env AGENT_CONTROL_BIND=0.0.0.0
            - name: AGENT_CONTROL_URL
              value: "http://host.docker.internal:4000"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: alproject
spec:
  # LoadBalancer: на Docker Desktop пробрасывается на localhost (NodePort на Windows часто недоступен с хоста).
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: portal
  ports:
    - name: http
      port: 3000
      targetPort: 3000
